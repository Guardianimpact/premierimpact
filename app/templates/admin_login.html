{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<section class="pg-hero" style="min-height:100vh;display:flex;align-items:center;padding-top:80px;">
    <div class="container">
        <div class="login-form">
            <h2>Admin <span class="g">Login</span></h2>
            {% if error %}
            <div class="err-msg">{{ error }}</div>
            {% endif %}
            <form method="POST" action="/admin/login">
                <div class="fg">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter admin password" required>
                </div>
                <button type="submit" class="btn btn-charcoal" style="width:100%;justify-content:center;">Log In</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
