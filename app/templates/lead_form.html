<!-- Inline Lead Form Component -->
<div id="leadForm{{ form_id|default('') }}">
    <form id="leadFormEl{{ form_id|default('') }}" onsubmit="return submitLead(event, '{{ form_id|default('') }}')">
        <div class="fg-row">
            <div class="fg">
                <label for="first_name{{ form_id|default('') }}">First Name</label>
                <input type="text" id="first_name{{ form_id|default('') }}" name="first_name" placeholder="John" required>
            </div>
            <div class="fg">
                <label for="last_name{{ form_id|default('') }}">Last Name</label>
                <input type="text" id="last_name{{ form_id|default('') }}" name="last_name" placeholder="Smith" required>
            </div>
        </div>
        <div class="fg">
            <label for="phone{{ form_id|default('') }}">Phone Number</label>
            <input type="tel" id="phone{{ form_id|default('') }}" name="phone" placeholder="(954) 555-1234" required>
        </div>
        <div class="fg">
            <label for="address{{ form_id|default('') }}">Property Address</label>
            <input type="text" id="address{{ form_id|default('') }}" name="address" placeholder="123 Main St, Boca Raton, FL" autocomplete="street-address">
        </div>
        <div class="fg-row">
            <div class="fg">
                <label for="service{{ form_id|default('') }}">Service Interest</label>
                <select id="service{{ form_id|default('') }}" name="service_interest" required>
                    <option value="" disabled selected>Select</option>
                    <option value="Impact Windows">Impact Windows</option>
                    <option value="Impact Doors">Impact Doors</option>
                    <option value="Windows & Doors">Windows & Doors</option>
                    <option value="Roofing">Roofing</option>
                    <option value="Full Home Protection">Full Home Protection</option>
                </select>
            </div>
            <div class="fg">
                <label for="best_time{{ form_id|default('') }}">Best Time to Call</label>
                <select id="best_time{{ form_id|default('') }}" name="best_time">
                    <option value="" disabled selected>Select</option>
                    <option value="Morning 8-12">Morning 8-12</option>
                    <option value="Afternoon 12-5">Afternoon 12-5</option>
                    <option value="Evening 5-8">Evening 5-8</option>
                </select>
            </div>
        </div>
        <label class="fg-check">
            <input type="checkbox" name="wants_financing">
            I'm interested in financing options
        </label>
        <div class="consent-field">
            <input type="checkbox" id="sms_consent{{ form_id|default('') }}" name="sms_consent" required>
            <label for="sms_consent{{ form_id|default('') }}">By submitting this form, I agree to receive SMS text messages and phone calls from Premier Impact Windows &amp; Roofing at the number provided. Message and data rates may apply. Reply STOP to unsubscribe. View our <a href="/privacy">Privacy Policy</a> and <a href="/terms">Terms of Service</a>.</label>
        </div>
        <input type="hidden" name="source_page" value="{{ source_override|default(page|default('')) }}">
        <input type="hidden" name="utm_source" value="">
        <input type="hidden" name="utm_medium" value="">
        <input type="hidden" name="utm_campaign" value="">
        <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;">
            Book My Free Assessment &rarr;
        </button>
        <p class="form-privacy">We respect your privacy. No spam, ever.</p>
    </form>
    <div id="leadSuccess{{ form_id|default('') }}" class="form-success" style="display:none;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <h3>Thank You, <span id="leadName{{ form_id|default('') }}"></span>!</h3>
        <p>We'll call you within the hour to confirm your free assessment.</p>
    </div>
</div>
